spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/ticketing-app
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  cloud:
    openfeign:
      # Kept OFF on purpose: enabling it makes Spring Cloud run each Feign call on a
      # separate thread (to enforce the resilience4j TimeLimiter), which drops the
      # TenantContext ThreadLocal that FeignTenantInterceptor reads — so the X-User-*
      # headers are never sent and user-service rejects the call with 403.
      # Resilience is still provided by the controller-level @CircuitBreaker + fallbacks.
      circuitbreaker:
        enabled: false